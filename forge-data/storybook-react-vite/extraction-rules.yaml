# Extraction Rules: storybook-react-vite
# Generated by create-skill workflow (Deep tier)

skill_name: storybook-react-vite
source_repo: https://github.com/storybookjs/storybook
source_version: "10.3.0"
source_branch: v10.3.0
language: typescript

extraction_method: source-reading
extraction_strategy: entry-point-driven
note: "Monorepo barrel-file architecture — entry-point tracing more effective than AST scanning for 1697+ TS files"

packages:
  - name: storybook
    path: code/core/src/
    entry_points:
      - test/index.ts
      - actions/index.ts
      - highlight/index.ts
      - viewport/index.ts
      - theming/index.ts
      - theming/create.ts
      - manager-api/index.ts
      - preview-api/index.ts
      - types/index.ts
      - csf/index.ts

  - name: "@storybook/react-vite"
    path: code/frameworks/react-vite/src/
    entry_points:
      - index.ts
      - node/index.ts
      - preset.ts

  - name: "@storybook/react"
    path: code/renderers/react/src/
    entry_points:
      - index.ts
      - preview.tsx
      - playwright.ts

  - name: "@storybook/builder-vite"
    path: code/builders/builder-vite/src/
    entry_points:
      - index.ts
      - preset.ts

  - name: "@storybook/addon-a11y"
    path: code/addons/a11y/src/
    entry_points:
      - index.ts
      - preview.tsx

  - name: "@storybook/addon-docs"
    path: code/addons/docs/src/
    entry_points:
      - index.ts
      - blocks.ts

  - name: "@storybook/addon-themes"
    path: code/addons/themes/src/
    entry_points:
      - index.ts
      - preview.ts

  - name: "@storybook/addon-vitest"
    path: code/addons/vitest/src/
    entry_points:
      - index.ts
      - vitest-plugin/index.ts
      - constants.ts

exclude_patterns:
  - "**/*.test.*"
  - "**/*.spec.*"
  - "**/test/**"
  - "**/tests/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/fixtures/**"

sparse_checkout:
  mode: no-cone
  includes:
    - "code/core/**"
    - "code/frameworks/react-vite/**"
    - "code/renderers/react/**"
    - "code/builders/builder-vite/**"
    - "code/addons/a11y/**"
    - "code/addons/docs/**"
    - "code/addons/themes/**"
    - "code/addons/vitest/**"
    - "docs/**"
