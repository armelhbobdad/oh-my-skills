---
name: "storybook-react-vite"
version: "10.3.0"
source_type: "source"
source_repo: "https://github.com/storybookjs/storybook"
language: "TypeScript"
description: "Full Storybook skill scoped to the React-Vite framework — covers core API (CSF, types, theming, testing, actions), Vite builder, React renderer, and essential addons (a11y, docs, themes, vitest) for component-driven development."
forge_tier: "Deep"
created: "2026-03-29"
created_by: "armel"
scope:
  type: "specific-modules"
  include:
    - "storybook — test, actions, highlight, viewport, theming, theming/create, manager-api, preview-api, internal/types, internal/csf"
    - "@storybook/react-vite — ., ./node, ./preset"
    - "@storybook/react — ., ./preview, ./experimental-playwright"
    - "@storybook/builder-vite — ., ./preset"
    - "@storybook/addon-a11y — ., ./preview"
    - "@storybook/addon-docs — ., ./blocks"
    - "@storybook/addon-themes — ., ./preview"
    - "@storybook/addon-vitest — ., ./vitest-plugin, ./constants"
    - "docs/ — writing-stories, writing-tests, api, configure, essentials (155 MDX pages)"
  exclude:
    - "**/*.test.*, **/*.spec.*, **/test/, **/tests/"
    - "**/dist/, **/build/"
    - "code/frameworks/{angular,ember,nextjs,nextjs-vite,preact-vite,react-native-web-vite,react-webpack5,server-webpack5,svelte-vite,sveltekit,vue3-vite,web-components-vite,html-vite}/"
    - "code/renderers/{html,preact,server,svelte,vue3,web-components}/"
    - "code/presets/"
    - "code/builders/builder-webpack5/"
    - "storybook/internal/* (except types, csf)"
    - "@storybook/addon-docs/{angular,ember,web-components}"
    - "@storybook/react/entry-preview-*"
  notes: "Public exports only. React-Vite scoped — all non-React frameworks, renderers, and webpack builders excluded. Core internal exports limited to types and CSF."
doc_urls:
  - url: "https://storybook.js.org/docs"
    label: "Main documentation site"
  - url: "https://storybook.js.org/docs/get-started/frameworks/react-vite/?renderer=react"
    label: "React-Vite framework guide"
  - url: "https://storybook.js.org/docs/api"
    label: "API reference"
  - url: "https://storybook.js.org/addons"
    label: "Addon catalog"
scripts_intent: "none"
assets_intent: "none"
source_authority: "community"
---
