# Extraction Rules — cognee
# Generated by create-skill workflow for reproducibility

skill_name: cognee
language: python
source_repo: https://github.com/topoteretes/cognee
source_branch: main
extraction_date: "2026-03-19"
forge_tier: Deep

# AST extraction method
extraction_method: cli_streaming
ast_tool: ast-grep
ast_version: "0.38.5"

# Patterns used for extraction
patterns:
  functions:
    pattern: "def $NAME($$$PARAMS)"
    language: python
    constraint: "NAME regex '^[^_]'"
  classes:
    pattern: "class $NAME($$$BASES)"
    language: python
    constraint: "NAME regex '^[^_]'"

# Scope filters from brief
scope:
  type: full-library
  include:
    - "cognee/**"
    - "examples/**"
    - "cognee-mcp/**"
  exclude:
    - "cognee/tests/**"
    - "**/test_*.py"
    - "**/dist/**"
    - "**/build/**"
    - "**/__pycache__/**"
    - "cognee-frontend/**"
    - "cognee-starter-kit/**"
    - "deployment/**"
    - "distributed/**"
    - "notebooks/**"
    - "tools/**"
    - "working_dir_error_replication/**"
    - "poetry.lock"
    - "uv.lock"

# Entry point for public API validation
entry_point: "cognee/__init__.py"

# Re-export tracing
re_export_tracing: true
re_export_depth: 1

# CLI streaming parameters (>500 files)
cli_streaming:
  json_format: stream
  head_limit: 300
  exclude_injection: true
